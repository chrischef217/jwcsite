<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWC - Contact</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html" id="logoLink">
                        <img id="logoImage" src="" alt="JWC" style="display: none;">
                        <span id="logoText">JWC</span>
                    </a>
                </div>
                <nav class="nav-menu" id="navMenu">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="products.html" class="nav-link">Products</a>
                    <a href="contact.html" class="nav-link active">Contact</a>
                </nav>
                <div class="header-actions">
                    <button class="admin-btn" onclick="location.href='admin-login.html'" title="관리자">
                        <span>⚙</span>
                    </button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Page Hero -->
    <section class="page-hero" id="pageHero" style="display: none;">
        <div class="page-hero-content">
            <h1>Contact</h1>
        </div>
    </section>

    <!-- Contact Content -->
    <section class="content-section">
        <div class="container">
            <h2>연락처</h2>
            <div class="contact-grid">
                <div class="contact-info">
                    <h3>회사 정보</h3>
                    <p><strong>회사명:</strong> JWC</p>
                    <p><strong>주소:</strong> 서울특별시</p>
                    <p><strong>전화:</strong> 02-1234-5678</p>
                    <p><strong>이메일:</strong> info@jwc.com</p>
                </div>
                <div class="contact-form">
                    <h3>문의하기</h3>
                    <form id="contactForm">
                        <input type="text" placeholder="이름" required>
                        <input type="email" placeholder="이메일" required>
                        <input type="tel" placeholder="전화번호" required>
                        <textarea placeholder="문의 내용" rows="5" required></textarea>
                        <button type="submit">문의하기</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2024 JWC. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/common.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
