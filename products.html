<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWC - Products</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html" id="logoLink">
                        <img id="logoImage" src="" alt="JWC" style="display: none;">
                        <span id="logoText">JWC</span>
                    </a>
                </div>
                <nav class="nav-menu" id="navMenu">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="products.html" class="nav-link active">Products</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
                <div class="header-actions">
                    <button class="admin-btn" onclick="location.href='admin-login.html'" title="관리자">
                        <span>⚙</span>
                    </button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Page Hero -->
    <section class="page-hero" id="pageHero" style="display: none;">
        <div class="page-hero-content">
            <h1>Products</h1>
        </div>
    </section>

    <!-- Products Content -->
    <section class="content-section">
        <div class="container">
            <h2>제품 소개</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="스킨케어">스킨케어</button>
                <button class="filter-btn" data-filter="메이크업">메이크업</button>
                <button class="filter-btn" data-filter="바디케어">바디케어</button>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- 제품들이 동적으로 추가됨 -->
                <p style="text-align: center; color: #666;">관리자 페이지에서 제품을 추가해주세요.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2024 JWC. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/common.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
