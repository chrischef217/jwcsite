<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - JWC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="products.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="JWC Logo">
                </a>
            </div>
            <button class="menu-btn" onclick="toggleMenu()" aria-label="Toggle navigation menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Navigation Menu -->
    <nav id="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="products.html" class="active">PRODUCTS</a>
        <a href="#contact">CONTACT</a>
    </nav>

    <!-- Products Hero Section -->
    <section class="products-hero">
        <div class="container">
            <h1>PRODUCTS</h1>
            <p>Premium K-Beauty Packaging Solutions</p>
        </div>
    </section>

    <!-- Category Filter -->
    <section class="category-filter">
        <div class="container">
            <button class="filter-btn active" data-category="all">All Products</button>
            <button class="filter-btn" data-category="cream">Cream Jars</button>
            <button class="filter-btn" data-category="essence">Essence & Serum</button>
            <button class="filter-btn" data-category="lotion">Lotion</button>
            <button class="filter-btn" data-category="eco">Eco-Friendly</button>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="products-section">
        <div class="container">
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded dynamically -->
                <p style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #999;">제품 목록을 불러오는 중...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 JWC. All rights reserved.</p>
        <a href="admin-login.html" style="color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.7rem;">Admin</a>
    </footer>

    <script src="products.js"></script>
    <script>
        function toggleMenu() {
            const nav = document.getElementById('nav');
            nav.classList.toggle('active');
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const nav = document.getElementById('nav');
            const menuBtn = document.querySelector('.menu-btn');
            if (nav.classList.contains('active') && !nav.contains(e.target) && !menuBtn.contains(e.target)) {
                nav.classList.remove('active');
            }
        });
    </script>
</body>
</html>
