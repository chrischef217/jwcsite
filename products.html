<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - JWC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="products.css">
    <!-- Updated: Page Hero Slider -->
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="JWC Logo">
                </a>
            </div>
            <button class="menu-btn" onclick="toggleMenu()" aria-label="Toggle navigation menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Navigation Menu -->
    <nav id="nav">
        <a href="about.html">ABOUT</a>
        <a href="products.html" class="active">PRODUCTS</a>
        <a href="certification.html">CERTIFICATION</a>
        <a href="notice.html">NOTICE</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <!-- Products Hero Slider (70vh - 30% smaller than main) -->
    <section class="page-hero-slider" id="productsHeroSlider">
        <div class="page-hero-slider-container" id="pageHeroSliderContainer">
            <!-- Slides will be loaded dynamically -->
        </div>
    </section>

    <!-- Search Filter Section -->
    <section class="search-filter-section">
        <div class="container">
            <div class="search-filter-box">
                <!-- Capacity Slider -->
                <div class="filter-group">
                    <label>용량</label>
                    <div class="capacity-slider-container">
                        <input type="range" id="capacityMin" min="0" max="1200" value="0" step="10" class="capacity-slider">
                        <input type="range" id="capacityMax" min="0" max="1200" value="1200" step="10" class="capacity-slider">
                        <div class="capacity-track"></div>
                        <div class="capacity-range" id="capacityRange"></div>
                    </div>
                    <div class="capacity-values">
                        <span><span id="capacityMinValue">0</span> ml</span>
                        <span>~</span>
                        <span><span id="capacityMaxValue">1200</span> ml</span>
                    </div>
                </div>

                <!-- Text Search -->
                <div class="filter-group">
                    <label>제품명 / 모델 / 사이즈</label>
                    <input type="text" id="searchText" placeholder="검색어를 입력하세요" class="search-input">
                </div>

                <!-- Material Checkboxes -->
                <div class="filter-group">
                    <label>재질 (MATERIAL)</label>
                    <div class="material-checkboxes" id="materialCheckboxes">
                        <!-- Materials will be loaded dynamically -->
                    </div>
                </div>

                <!-- Search Button -->
                <button class="search-btn" onclick="applyFilters()">🔍 검색</button>
                <button class="reset-btn" onclick="resetFilters()">↺ 초기화</button>
            </div>
        </div>
    </section>

    <!-- Category Filter -->
    <section class="category-filter">
        <div class="container" id="categoryFilterContainer">
            <!-- Category buttons will be loaded dynamically from API -->
            <button class="filter-btn active" data-category="all">전체 제품</button>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="products-section">
        <div class="container">
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded dynamically -->
                <p style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #999;">제품 목록을 불러오는 중...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 JWC. All rights reserved.</p>
        <a href="admin-login.html" style="opacity: 0.3; font-size: 12px;">⚙️</a>
    </footer>

    <!-- Product Detail Modal -->
    <div id="productModal" class="product-modal">
        <div class="product-modal-content">
            <button class="modal-close-btn" onclick="closeProductModal()">&times;</button>
            <div class="modal-body">
                <!-- Product Image Gallery -->
                <div class="modal-image-section">
                    <div class="modal-image-gallery">
                        <div class="modal-main-image">
                            <img id="modalMainImage" src="" alt="Product">
                        </div>
                        <div class="modal-image-thumbnails" id="modalImageThumbnails">
                            <!-- Thumbnails will be added here -->
                        </div>
                    </div>
                </div>
                
                <!-- Product Info Section -->
                <div class="modal-info-section">
                    <h2 id="modalProductName">제품 코드</h2>
                    
                    <!-- Basic Info -->
                    <div class="modal-section">
                        <h3 style="font-size: 1.1rem; color: #007bff; margin-bottom: 12px; border-bottom: 2px solid #007bff; padding-bottom: 8px;">기본 정보</h3>
                        <div class="modal-product-details">
                            <div class="detail-row">
                                <span class="detail-label">용량:</span>
                                <span id="modalProductVolume">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">카테고리:</span>
                                <span id="modalProductCategory">-</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Dimensions -->
                    <div class="modal-section" id="modalDimensionsSection" style="display: none;">
                        <h3 style="font-size: 1.1rem; color: #28a745; margin-bottom: 12px; border-bottom: 2px solid #28a745; padding-bottom: 8px;">치수 정보</h3>
                        <div class="modal-product-details" id="modalDimensions"></div>
                    </div>
                    
                    <!-- Components -->
                    <div class="modal-section" id="modalComponentsSection" style="display: none;">
                        <h3 style="font-size: 1.1rem; color: #6f42c1; margin-bottom: 12px; border-bottom: 2px solid #6f42c1; padding-bottom: 8px;">부품 구성 및 원료</h3>
                        <div id="modalComponents"></div>
                    </div>
                    
                    <!-- Assembly & Delivery -->
                    <div class="modal-section" id="modalAssemblySection" style="display: none;">
                        <h3 style="font-size: 1.1rem; color: #fd7e14; margin-bottom: 12px; border-bottom: 2px solid #fd7e14; padding-bottom: 8px;">조립 및 납품</h3>
                        <div class="modal-product-details">
                            <div class="detail-row" id="modalAssemblyRow" style="display: none;">
                                <span class="detail-label">조립:</span>
                                <span id="modalAssembly" style="white-space: pre-wrap;">-</span>
                            </div>
                            <div class="detail-row" id="modalDeliveryRow" style="display: none;">
                                <span class="detail-label">납품시 set:</span>
                                <span id="modalDeliverySet" style="white-space: pre-wrap;">-</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Cross Section Image -->
                    <div class="modal-section" id="modalCrossSectionSection" style="display: none;">
                        <h3 style="font-size: 1.1rem; color: #17a2b8; margin-bottom: 12px; border-bottom: 2px solid #17a2b8; padding-bottom: 8px;">단면 사진</h3>
                        <img id="modalCrossSectionImage" src="" alt="단면 사진" style="width: 100%; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                    
                    <button class="sample-request-btn" onclick="openSampleRequestModal()">📋 샘플 신청하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sample Request Modal -->
    <div id="sampleRequestModal" class="sample-request-modal">
        <div class="sample-modal-content">
            <button class="modal-close-btn" onclick="closeSampleRequestModal()">&times;</button>
            <h2>📋 샘플 신청</h2>
            
            <form id="sampleRequestForm" onsubmit="submitSampleRequest(event)">
                <div class="form-group">
                    <label>회사명 *</label>
                    <input type="text" id="sampleCompany" required placeholder="회사명을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label>이름 *</label>
                    <input type="text" id="sampleName" required placeholder="이름을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label>연락처 *</label>
                    <input type="tel" id="samplePhone" required placeholder="000-0000-0000" pattern="[0-9]{2,3}-[0-9]{3,4}-[0-9]{4}">
                    <small>형식: 000-0000-0000</small>
                </div>
                
                <div class="form-group">
                    <label>이메일 *</label>
                    <input type="email" id="sampleEmail" required placeholder="example@email.com">
                    <small>형식: XXX@XXX.XXX</small>
                </div>
                
                <div class="form-group">
                    <label>주소 *</label>
                    <input type="text" id="sampleAddress" required placeholder="배송 받으실 주소를 입력하세요">
                </div>
                
                <div class="form-group">
                    <label>문의 내용</label>
                    <textarea id="sampleMessage" rows="4" placeholder="문의 내용을 입력하세요"></textarea>
                </div>
                
                <div class="sample-product-info">
                    <h3>신청 제품 정보</h3>
                    <div class="sample-product-details" id="sampleProductDetails">
                        <!-- Product details will be inserted here -->
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit">✅ 신청하기</button>
                    <button type="button" class="btn-cancel" onclick="closeSampleRequestModal()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script src="products.js"></script>
    <script>
        function toggleMenu() {
            const nav = document.getElementById('nav');
            nav.classList.toggle('active');
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const nav = document.getElementById('nav');
            const menuBtn = document.querySelector('.menu-btn');
            if (nav.classList.contains('active') && !nav.contains(e.target) && !menuBtn.contains(e.target)) {
                nav.classList.remove('active');
            }
        });

        // ========== PAGE HERO SLIDER ==========
        let currentPageSlide = 0;
        let pageSlideTimeout;

        async function loadPageHeroSlider() {
            try {
                const response = await fetch('/api/hero/page/products');
                const data = await response.json();
                
                const media = data.media || [];
                const settings = data.settings || {};

                console.log('Products hero data:', media.length, 'items');

                if (!media || media.length === 0) {
                    // Keep default background - don't hide
                    console.log('No hero data - using default background');
                    return;
                }

                // Remove default background when we have data
                const heroSection = document.getElementById('productsHeroSlider');
                heroSection.style.background = 'none';

                const sortedMedia = media.sort((a, b) => (a.order_index || 0) - (b.order_index || 0));
                renderPageHeroSlider(sortedMedia, settings);
            } catch (error) {
                console.error('Failed to load page hero slider:', error);
                // Keep default background on error
            }
        }

        function renderPageHeroSlider(media, settings) {
            const container = document.getElementById('pageHeroSliderContainer');
            container.innerHTML = '';

            media.forEach((item, index) => {
                const slide = document.createElement('div');
                slide.className = `page-hero-slide${index === 0 ? ' active' : ''}`;

                // API returns mediaType and data fields, support both old and new format
                const isVideo = item.mediaType === 'video' || item.type === 'video';
                const mediaUrl = item.data || item.url;

                if (isVideo) {
                    const video = document.createElement('video');
                    video.className = 'page-hero-video';
                    video.src = mediaUrl;
                    video.autoplay = index === 0;
                    video.muted = true;
                    video.playsInline = true;
                    video.loop = false;
                    video.addEventListener('ended', () => nextPageSlide());
                    slide.appendChild(video);
                } else {
                    slide.style.backgroundImage = `url(${mediaUrl})`;
                }

                const overlay = document.createElement('div');
                overlay.className = 'page-hero-overlay';
                
                if (settings.title_type === 'text' && settings.title_text) {
                    const title = document.createElement('h1');
                    title.textContent = settings.title_text;
                    overlay.appendChild(title);
                } else if (settings.title_type === 'logo' && settings.title_image) {
                    const logo = document.createElement('img');
                    logo.src = settings.title_image;
                    logo.alt = 'Title';
                    logo.style.maxWidth = '400px';
                    logo.style.height = 'auto';
                    overlay.appendChild(logo);
                }

                if (settings.content) {
                    const content = document.createElement('p');
                    content.innerHTML = settings.content.replace(/\n/g, '<br>');
                    overlay.appendChild(content);
                }

                slide.appendChild(overlay);
                container.appendChild(slide);
            });
        }

        function goToPageSlide(index) {
            const slides = document.querySelectorAll('.page-hero-slide');
            if (index >= slides.length) index = 0;
            if (index < 0) index = slides.length - 1;

            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
                const video = slide.querySelector('video');
                if (video) {
                    if (i === index) {
                        video.currentTime = 0;
                        video.play();
                    } else {
                        video.pause();
                    }
                }
            });

            currentPageSlide = index;
            
            const activeSlide = slides[currentPageSlide];
            const hasVideo = activeSlide.querySelector('video');
            if (!hasVideo) {
                scheduleNextPageSlide();
            }
        }

        function nextPageSlide() {
            goToPageSlide(currentPageSlide + 1);
        }

        function scheduleNextPageSlide() {
            clearTimeout(pageSlideTimeout);
            pageSlideTimeout = setTimeout(nextPageSlide, 5000);
        }

        loadPageHeroSlider();
    </script>
</body>
</html>
