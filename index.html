<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWC - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="JWC">
            </a>
            <button class="menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <nav id="navMenu">
        <a href="index.html" class="active">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="products.html">PRODUCTS</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main>
        <section class="hero">
            <h1>Welcome to JWC</h1>
            <p>Premium Cosmetics</p>
        </section>

        <section class="content">
            <div class="container">
                <div class="cards">
                    <div class="card">
                        <h2>💡 Innovation</h2>
                        <p>끊임없는 연구와 혁신으로 최고의 제품을 만듭니다.</p>
                    </div>
                    <div class="card">
                        <h2>⭐ Quality</h2>
                        <p>엄격한 품질 관리로 신뢰할 수 있는 제품을 제공합니다.</p>
                    </div>
                    <div class="card">
                        <h2>🤝 Trust</h2>
                        <p>고객과의 신뢰를 최우선으로 생각합니다.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 JWC. All rights reserved.</p>
        <a href="admin-login.html" style="opacity: 0.3; font-size: 12px;">⚙️</a>
    </footer>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navMenu');
            nav.classList.toggle('active');
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const nav = document.getElementById('navMenu');
            const menuBtn = document.querySelector('.menu-btn');
            
            if (!nav.contains(event.target) && !menuBtn.contains(event.target)) {
                nav.classList.remove('active');
            }
        });
    </script>
</body>
</html>
