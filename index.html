<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWC - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="JWC">
            </a>
            <button class="menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <nav id="navMenu">
        <a href="about.html">ABOUT</a>
        <a href="products.html">PRODUCTS</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main>
        <section class="hero" id="heroSlider">
            <div class="hero-slider-container">
                <div class="hero-slider-wrapper" id="heroSliderWrapper">
                    <!-- Default content if no slider -->
                    <div class="hero-slide active">
                        <div class="hero-content">
                            <h1>Welcome to JWC</h1>
                            <p>Premium Cosmetics</p>
                        </div>
                    </div>
                </div>
                <div class="hero-slider-dots" id="heroSliderDots"></div>
            </div>
        </section>

        <section class="content">
            <div class="container">
                <div class="cards">
                    <div class="card">
                        <h2>💡 Innovation</h2>
                        <p>끊임없는 연구와 혁신으로 최고의 제품을 만듭니다.</p>
                    </div>
                    <div class="card">
                        <h2>⭐ Quality</h2>
                        <p>엄격한 품질 관리로 신뢰할 수 있는 제품을 제공합니다.</p>
                    </div>
                    <div class="card">
                        <h2>🤝 Trust</h2>
                        <p>고객과의 신뢰를 최우선으로 생각합니다.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 JWC. All rights reserved.</p>
        <a href="admin-login.html" style="opacity: 0.3; font-size: 12px;">⚙️</a>
    </footer>

    <script>
        let currentSlide = 0;
        let sliderInterval;
        let heroMediaItems = [];

        function toggleMenu() {
            const nav = document.getElementById('navMenu');
            nav.classList.toggle('active');
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const nav = document.getElementById('navMenu');
            const menuBtn = document.querySelector('.menu-btn');
            
            if (!nav.contains(event.target) && !menuBtn.contains(event.target)) {
                nav.classList.remove('active');
            }
        });

        // Load hero slider
        async function loadHeroSlider() {
            try {
                const response = await fetch('/api/hero');
                const items = await response.json();
                heroMediaItems = items.sort((a, b) => (a.order_index || 0) - (b.order_index || 0));
                
                // Load settings
                const settingsResponse = await fetch('/api/hero/settings');
                const settings = await settingsResponse.json();
                const sliderText = settings.text || '';
                const slideInterval = (settings.interval || 5) * 1000;
                
                console.log('✅ 로드:', heroMediaItems.length, '개, 텍스트:', sliderText);
                
                if (heroMediaItems.length > 0) {
                    renderHeroSlider(sliderText);
                    if (heroMediaItems.length > 1) {
                        startSlider(slideInterval);
                    }
                }
            } catch (error) {
                console.error('Failed to load hero slider:', error);
            }
        }

        function renderHeroSlider(sliderText) {
            const wrapper = document.getElementById('heroSliderWrapper');
            const dots = document.getElementById('heroSliderDots');
            
            wrapper.innerHTML = '';
            dots.innerHTML = '';
            
            heroMediaItems.forEach((item, index) => {
                const slide = document.createElement('div');
                slide.className = 'hero-slide' + (index === 0 ? ' active' : '');
                
                if (item.mediaType === 'video') {
                    slide.innerHTML = `
                        <video class="hero-media" autoplay loop muted playsinline>
                            <source src="${item.data}" type="video/mp4">
                        </video>
                        ${sliderText ? `<div class="hero-text-overlay"><h1 style="color: white;">${sliderText}</h1></div>` : ''}
                    `;
                } else {
                    slide.style.backgroundImage = `url(${item.data})`;
                    slide.style.backgroundSize = 'cover';
                    slide.style.backgroundPosition = 'center';
                    slide.innerHTML = `
                        ${sliderText ? `<div class="hero-text-overlay"><h1 style="color: white;">${sliderText}</h1></div>` : ''}
                    `;
                }
                
                wrapper.appendChild(slide);
                
                // Add dot
                const dot = document.createElement('span');
                dot.className = 'slider-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(index);
                dots.appendChild(dot);
            });
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.hero-slide');
            const dots = document.querySelectorAll('.slider-dot');
            
            if (slides.length === 0) return;
            
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            
            currentSlide = index;
            
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        function nextSlide() {
            const nextIndex = (currentSlide + 1) % heroMediaItems.length;
            goToSlide(nextIndex);
        }

        function startSlider(interval = 5000) {
            if (sliderInterval) clearInterval(sliderInterval);
            sliderInterval = setInterval(nextSlide, interval);
        }

        // Load slider on page load
        loadHeroSlider();
    </script>
</body>
</html>
