<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWC - Home</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html" id="logoLink">
                        <img id="logoImage" src="" alt="JWC" style="display: none;">
                        <span id="logoText">JWC</span>
                    </a>
                </div>
                <nav class="nav-menu" id="navMenu">
                    <a href="index.html" class="nav-link active">Home</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="products.html" class="nav-link">Products</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
                <div class="header-actions">
                    <button class="admin-btn" onclick="location.href='admin-login.html'" title="관리자">
                        <span>⚙</span>
                    </button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="heroSection">
        <div class="hero-slider" id="heroSlider"></div>
        <div class="hero-nav">
            <button class="hero-nav-btn prev" id="prevBtn">‹</button>
            <button class="hero-nav-btn next" id="nextBtn">›</button>
        </div>
        <div class="hero-dots" id="heroDots"></div>
    </section>

    <!-- Company Info Section -->
    <section class="company-info">
        <div class="container">
            <h2>JWC</h2>
            <p>화장품 전문 기업</p>
            <div class="info-grid">
                <div class="info-card">
                    <h3>혁신</h3>
                    <p>끊임없는 연구개발로 혁신적인 제품을 선보입니다</p>
                </div>
                <div class="info-card">
                    <h3>품질</h3>
                    <p>최고 품질의 원료와 철저한 품질관리를 약속합니다</p>
                </div>
                <div class="info-card">
                    <h3>신뢰</h3>
                    <p>고객의 신뢰를 최우선으로 생각합니다</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2024 JWC. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/common.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
